<!DOCTYPE html>
<html class="theme-dark" lang="pt-br"> <!-- Forcei o tema dark para um visual mais dev -->

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Meus Projetos | Dashboard</title>
    <link rel="icon" type="image/x-icon" href="images/avatar.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
</head>

<body>

    <div class="container">
        <div class="column">

            <!-- Você pode trocar essa imagem na pasta images/avatar.png -->
            <img class="avatar avatar--rounded" src="images/avatar.png" alt="Avatar">

            <h1>
                <div>Meus Deploys</div>
            </h1>

            <p>Atalhos rápidos para meus apps pessoais.</p>

            <div class="button-stack" role="navigation">

                <!-- Link 1: Orçamento -->
                <a class="button button-default" href="https://orcamento-909.pages.dev/" target="_blank" rel="noopener" role="button">
                    <img class="icon" aria-hidden="true" src="images/icons/generic-homepage.svg" alt="App Icon">
                    Orçamento Pessoal
                </a>

                <!-- Link 2: Weekly Planner -->
                <a class="button button-default" href="https://weekly-planner-dqh.pages.dev" target="_blank" rel="noopener" role="button">
                    <img class="icon" aria-hidden="true" src="images/icons/generic-calendar.svg" alt="Calendar Icon">
                    Weekly Planner
                </a>

                <!-- Link 3: Diagrama Cerrado (Ícone de bolsa de valores / ações) -->
                <a class="button button-default" href="https://diagrama-cerrado.pages.dev/" target="_blank" rel="noopener" role="button">
                    <img class="icon" aria-hidden="true" src="images/icons/generic-stocks.svg" alt="Stocks Icon">
                    Diagrama Cerrado
                </a>

                <!-- Link extra: GitHub (Caso queira manter um atalho pro seu código) -->
                <a class="button button-github" href="https://github.com/TiagoNarita/littlelink" target="_blank" rel="noopener" role="button">
                    <img class="icon" aria-hidden="true" src="images/icons/github.svg" alt="GitHub Logo">
                    Meu GitHub
                </a>

            </div>

            <footer>
                Desenvolvido por você | <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
            </footer>

        </div>
    </div>

</body>
</html>
